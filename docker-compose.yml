services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vg_pass}
      POSTGRES_DB: ${POSTGRES_DB:-vg_hub}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vg_user} -d ${POSTGRES_DB:-vg_hub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_URL=postgresql+asyncpg://${POSTGRES_USER:-vg_user}:${POSTGRES_PASSWORD:-vg_pass}@postgres:5432/${POSTGRES_DB:-vg_hub}
      - SECRET_KEY=${SECRET_KEY:-y0uR_s3cr3t_k3y_h3r3}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-nodes-onprintshop:/opt/custom-nodes/n8n-nodes-onprintshop
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /home/node/.n8n/nodes/node_modules/n8n-nodes-onprintshop
        cp -r /opt/custom-nodes/n8n-nodes-onprintshop/package.json /home/node/.n8n/nodes/node_modules/n8n-nodes-onprintshop/
        cp -r /opt/custom-nodes/n8n-nodes-onprintshop/dist /home/node/.n8n/nodes/node_modules/n8n-nodes-onprintshop/
        echo '{"name":"installed-nodes","version":"1.0.0","dependencies":{"n8n-nodes-onprintshop":"*"}}' > /home/node/.n8n/nodes/package.json
        exec n8n start
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  n8n_data:
