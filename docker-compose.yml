services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vg_pass}
      POSTGRES_DB: ${POSTGRES_DB:-vg_hub}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vg_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
